# deploy-notify.conf - Configuration for deployment notifications
# This file is sourced by auto-deploy.sh

# Signal recipient (NOVA's number)
# Override this with the actual Signal number
SIGNAL_RECIPIENT="+1234567890"

# OpenClaw binary path
OPENCLAW_BIN="openclaw"

# Deployment log location
DEPLOY_LOG="/tmp/deploy.log"

# Working directory (defaults to current directory)
# WORK_DIR="/path/to/repo"

# Notification settings
SEND_SIGNAL=true
TRIGGER_WAKE_EVENT=true
CREATE_DEPLOYMENT_MARKER=true

# Timeout for notification attempts (seconds)
NOTIFICATION_TIMEOUT=30

# Retry settings
MAX_RETRIES=3
RETRY_DELAY=5
